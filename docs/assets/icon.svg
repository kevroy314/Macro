<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Protein bar (green) -->
  <rect x="80" y="140" width="200" height="50" rx="8" fill="#4ADE80"/>
  <text x="95" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0a0a14">P</text>

  <!-- Carbs bar (cyan) -->
  <rect x="80" y="220" width="280" height="50" rx="8" fill="#22D3EE"/>
  <text x="95" y="255" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0a0a14">C</text>

  <!-- Fat bar (gold) -->
  <rect x="80" y="300" width="140" height="50" rx="8" fill="#FBBF24"/>
  <text x="95" y="335" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0a0a14">F</text>

  <!-- Plus button -->
  <circle cx="400" cy="256" r="70" fill="#A78BFA"/>
  <rect x="385" y="226" width="30" height="60" rx="4" fill="#1a1a2e"/>
  <rect x="370" y="241" width="60" height="30" rx="4" fill="#1a1a2e"/>
</svg>
